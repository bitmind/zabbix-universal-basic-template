zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 7df96b18c230490a9a0a9e2307226338
      name: Templates
  templates:
    - uuid: 07b51f20dba549a69d0bbbc174eb7eeb
      template: Universal
      name: Universal
      description: |
        This simple template adds a basic dashboard to any existing host, providing inexperienced users with an easy and comprehensive host-centric view to explore:
        
        * All host items, including graphs and descriptions.
        * All host problems, including those already acknowledged.
        * General host information (hostname, address, interfaces, inventory) and monitoring status (maintenance, unsupported items).
      vendor:
        name: Bitmind
        version: "1.2"
      groups:
        - name: Templates
      items:
        - uuid: 702bba478eeb40dfac7f69049eabee83
          name: 'Zabbix host: Enabled items'
          type: INTERNAL
          key: 'zabbix[host, ,items]'
          delay: 10m
          history: 7d
          description: 'Number of enabled items on the host.'
          valuemap:
            name: 'Items enabled'
          tags:
            - tag: component
              value: zabbix
        - uuid: afcff789c9424865a2c565b61f39a392
          name: 'Zabbix host: Not supported items'
          type: INTERNAL
          key: 'zabbix[host, ,items_unsupported]'
          delay: 10m
          history: 7d
          description: 'Number of unsupported items on the host.'
          tags:
            - tag: component
              value: zabbix
        - uuid: 09fd200ef3f94dd99ff477be2c7936ac
          name: 'Zabbix host: Maintenance status'
          type: INTERNAL
          key: 'zabbix[host, ,maintenance]'
          history: 7d
          trends: '0'
          description: 'Zabbix maintenance status for this host'
          valuemap:
            name: 'Maintenance status'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: zabbix
        - uuid: 1f7d2aa3e13f4463982e3bb00d04195c
          name: 'Zabbix host: Active agent availability'
          type: INTERNAL
          key: 'zabbix[host, active_agent, available]'
          history: 7d
          trends: '0'
          description: 'ZBX Active agent checks availability for this host'
          valuemap:
            name: 'Active checks availability'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: zabbix
        - uuid: 51d11aac5c594059840e62be01451838
          name: 'Zabbix host: Agent availability'
          type: INTERNAL
          key: 'zabbix[host, agent, available]'
          history: 7d
          trends: '0'
          description: 'ZBX agent interfaces availability for this host'
          valuemap:
            name: 'Interfaces availability'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: zabbix
        - uuid: f81b8c302b9e4fafada443e7c84c4fce
          name: 'Zabbix host: Interfaces'
          type: INTERNAL
          key: 'zabbix[host, discovery, interfaces]'
          delay: 10m
          history: 7d
          value_type: TEXT
          trends: '0'
          description: 'List of monitoring interfaces, in html format, for dashboard purposes.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
            - type: JAVASCRIPT
              parameters:
                - |
                  //convert json to html for dashboard visualization
                  try {
                      // Parsa il valore in ingresso (assunto come stringa JSON)
                      var data = JSON.parse(value);
                      
                      // Inizio della tabella
                      var html = '<table>';
                      // Definizione dell'intestazione
                      //html += '<thead>';
                      html += '<tr><td>Type</td><td>Address</td><td>Port</td></tr>';
                      //html += '</thead>';
                      
                      // Corpo della tabella
                      //html += '<tbody>';
                      
                      data.forEach(function(item) {
                          html += '<tr>';
                          html += '<td> ' + item["{#IF.TYPE}"] + ' </td>';
                          html += '<td> ' + item["{#IF.CONN}"] + ' </td>';
                          html += '<td> ' + item["{#IF.PORT}"] + ' </td>';
                          html += '</tr>';
                      });
                      
                      //html += '</tbody>';
                      html += '</table>';
                      
                      return html;
                  } catch (error) {
                      return 'Error: Could not process JSON to HTML table. ' + error.message;
                  }
          tags:
            - tag: component
              value: raw
        - uuid: e65ee92b41404cf6920d4f2496bc140c
          name: 'Zabbix host: IPMI availability'
